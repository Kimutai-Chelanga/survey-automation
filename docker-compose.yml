# ============================================================
# docker-compose.yml
# ============================================================
version: '3.8'

# ------------------------------------------------------------------
# Named volumes
# ------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  chrome_profiles:
    driver: local
  recordings:
    driver: local
  cookie_scripts:
    driver: local
  downloads:
    driver: local
  root_downloads:
    driver: local
  workflows_export:
    driver: local
  prompt_backups:
    driver: local

networks:
  app_network:
    driver: bridge

# ------------------------------------------------------------------
# Services
# ------------------------------------------------------------------
services:

  # ----------------------------------------------------------------
  # MongoDB
  # ----------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: messages_db
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: messages
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow", "-d", "messages"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Streamlit app  (VNC + Chrome + Playwright)
  # ----------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamlit_app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "8501:8501"      # Streamlit UI
      - "6080:6080"      # noVNC browser UI
      - "5900:5900"      # Raw VNC
      - "9222-9322:9222-9322"  # Chrome CDP debug ports
    volumes:
      - .:/app
      - ./.env:/app/.env
      - chrome_profiles:/app/chrome_profiles:rw
      - chrome_profiles:/workspace/chrome_profiles:rw
      - recordings:/app/recordings:rw
      - recordings:/workspace/recordings:rw
      - downloads:/workspace/downloads:rw
      - ./editthiscookie:/app/editthiscookie:ro
      - cookie_scripts:/app/cookie_scripts:rw
      - root_downloads:/root/Downloads:rw
      - ./host_downloads:/root/Downloads_host:rw
      - workflows_export:/app/workflows_export:rw
      - prompt_backups:/app/prompt_backups:rw
    environment:
      # Auth
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-480}

      # Streamlit
      STREAMLIT_SERVER_ENABLE_CORS: "false"
      STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "false"
      STREAMLIT_SERVER_HEADLESS: "true"

      # Python
      PYTHONPATH: /app
      PYTHONWARNINGS: ignore::UserWarning
      PYTHONUNBUFFERED: 1

      # Databases
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/messages
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/messages_db?authSource=admin

      # Chrome
      CHROME_PROFILE_DIR: /workspace/chrome_profiles
      CHROME_PROFILES_BASE_DIR: /workspace/chrome_profiles
      CHROME_USER_DATA_DIR: /workspace/chrome_profiles
      CHROME_DOWNLOAD_DIR: /workspace/downloads
      CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
      CHROME_DEBUG_PORT_START: 9222

      # Playwright — point to system Chrome so no second browser is downloaded
      PLAYWRIGHT_BROWSERS_PATH: /usr/bin

      # Workspace paths
      RECORDINGS_DIR: /workspace/recordings
      DOWNLOADS_DIR: /workspace/downloads
      WORKSPACE_DIR: /workspace
      WORKFLOWS_EXPORT_DIR: /app/workflows_export
      PROMPT_BACKUPS_DIR: /app/prompt_backups

      # Display / VNC
      DISPLAY: ":99"
      VNC_PASSWORD: secret
      VNC_PORT: 5900
      NOVNC_PORT: 6080

      # Timezone
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}

      # API keys
      HYPERBROWSER_API_KEY: ${HYPERBROWSER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app_network
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined