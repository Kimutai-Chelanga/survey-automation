# GitHub Actions workflow for deploying to Contabo VPS
name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src || echo "⚠️ No tests found, continuing..."

      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.prod.yml config

  build-app:
    name: Build Main App Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for app
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  build-airflow:
    name: Build Airflow Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for airflow
        id: meta-airflow
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/airflow
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push airflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.airflow
          push: true
          tags: ${{ steps.meta-airflow.outputs.tags }}
          labels: ${{ steps.meta-airflow.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/airflow:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/airflow:buildcache,mode=max

  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest
    needs: [build-app, build-airflow]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            # Navigate to app directory
            cd /opt/final-automation || exit 1
            echo "✓ Changed to app directory"

            # Login to GitHub Container Registry with GHCR_PAT
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "✓ Logged in to GitHub Container Registry"

            # Pull latest Docker images
            echo "📥 Pulling latest Docker images..."
            docker compose -f docker-compose.prod.yml pull
            echo "✓ Images pulled"

            # Restart services with zero downtime
            echo "🔄 Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "✓ Services restarted"

            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 15

            # Health checks (run on VPS, not GitHub runner)
            echo "🏥 Checking service health..."
            curl -f https://localhost/_stcore/health || echo "⚠️ Streamlit not ready yet"
            curl -f https://localhost:8443/health || echo "⚠️ Airflow not ready yet"

            # Check service status
            docker compose -f docker-compose.prod.yml ps

            # Clean up old images (safer approach)
            echo "🧹 Cleaning up old resources..."
            docker image prune -f
            docker container prune -f
            echo "✓ Cleanup complete"

            echo "✅ Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ =========================================="
            echo "✅ DEPLOYMENT SUCCESSFUL!"
            echo "✅ =========================================="
            echo ""
            echo "🌐 Access your application:"
            echo "   • Streamlit: https://${{ secrets.SERVER_HOST }}/"
            echo "   • Airflow:   https://${{ secrets.SERVER_HOST }}:8443/"
            echo "   • VNC:       https://${{ secrets.SERVER_HOST }}/vnc/"
            echo ""
            echo "📊 View logs:"
            echo "   ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
            echo "   cd /opt/final-automation"
            echo "   docker compose -f docker-compose.prod.yml logs -f"
          else
            echo "❌ =========================================="
            echo "❌ DEPLOYMENT FAILED!"
            echo "❌ =========================================="
            echo ""
            echo "🔍 Check logs:"
            echo "   ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
            echo "   cd /opt/final-automation"
            echo "   docker compose -f docker-compose.prod.yml logs"
            echo ""
            echo "📋 GitHub Actions: https://github.com/${{ github.repository }}/actions"
          fi
