version: '3.8'

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  airflow_logs:
    driver: local
  chrome_profiles:
    driver: local
  recordings:
    driver: local
  cookie_scripts:
    driver: local
  downloads:
    driver: local
  root_downloads:
    driver: local
  backups:
    driver: local
  workflows_export:
    driver: local
  prompt_backups:
    driver: local

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:

  # ─────────────────────────────────────────────────────────────────
  # VOLUME INIT: Runs as root, fixes ownership/permissions on all
  # named volumes BEFORE any Airflow service starts.
  # ✅ UPDATED: Now properly fixes chrome_profiles ownership to 50000:0
  # ─────────────────────────────────────────────────────────────────
  volume-init:
    image: busybox:latest
    container_name: volume_init
    user: "0:0"
    volumes:
      - chrome_profiles:/workspace/chrome_profiles
      - recordings:/workspace/recordings
      - downloads:/workspace/downloads
      - downloads:/opt/airflow/workspace/downloads
      - airflow_logs:/opt/airflow/logs
      - backups:/opt/airflow/backups
      - workflows_export:/opt/airflow/workflows_export
      - prompt_backups:/opt/airflow/prompt_backups
      - root_downloads:/root/Downloads
    command: >
      sh -c "
        echo '=== Volume Permission + Ownership Init ===' &&
        echo 'Fixing chrome_profiles ownership (critical for Chrome startup)...' &&
        chown -R 50000:0 /workspace/chrome_profiles &&
        chmod 755 /workspace/chrome_profiles &&
        echo '  ✓ /workspace/chrome_profiles: 50000:0 (755)' &&

        echo 'Fixing other volume ownership...' &&
        chown -R 50000:0 /workspace/recordings &&
        chown -R 50000:0 /workspace/downloads &&
        chown -R 50000:0 /opt/airflow/workspace/downloads &&
        chown -R 50000:0 /opt/airflow/logs &&
        chown -R 50000:0 /opt/airflow/backups &&
        chown -R 50000:0 /opt/airflow/workflows_export &&
        chown -R 50000:0 /opt/airflow/prompt_backups &&

        chmod 755 /workspace/recordings &&
        chmod 755 /workspace/downloads &&
        chmod 777 /opt/airflow/workspace/downloads &&
        chmod 777 /opt/airflow/logs &&
        chmod 777 /opt/airflow/backups &&
        chmod 777 /opt/airflow/workflows_export &&
        chmod 777 /opt/airflow/prompt_backups &&
        chmod 777 /root/Downloads 2>/dev/null || true &&

        echo '' &&
        echo 'Final ownership verification:' &&
        ls -ld /workspace/chrome_profiles &&
        echo '' &&
        echo '✓ All volume ownership and permissions set'
      "
    networks:
      - app_network
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Nginx reverse proxy for IP whitelisting and SSL
  # ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx:rw
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - airflow-webserver
    networks:
      - app_network
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}

  # ─────────────────────────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    env_file:
      - .env.production
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: messages_db
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}", "-d", "${POSTGRES_DB:-messages}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Streamlit App
  # ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamlit_app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    expose:
      - "8501"
      - "6080"
      - "5900"
    volumes:
      - .:/app
      - ./.env.production:/app/.env:ro
      - chrome_profiles:/app/chrome_profiles:rw
      - chrome_profiles:/workspace/chrome_profiles:rw
      - recordings:/app/recordings:rw
      - recordings:/workspace/recordings:rw
      - downloads:/workspace/downloads:rw
      - downloads:/opt/airflow/workspace/downloads:rw
      - ./editthiscookie:/app/editthiscookie:ro
      - cookie_scripts:/app/cookie_scripts:rw
      - root_downloads:/root/Downloads:rw
      - ./host_downloads:/root/Downloads_host:rw
      - workflows_export:/app/workflows_export:rw
      - prompt_backups:/app/prompt_backups:rw
    env_file:
      - .env.production
    environment:
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-480}
      STREAMLIT_SERVER_ENABLE_CORS: "false"
      STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "true"
      STREAMLIT_SERVER_HEADLESS: "true"
      PYTHONPATH: /app
      DATABASE_URL: postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/messages_db?authSource=admin
      CHROME_PROFILE_DIR: /workspace/chrome_profiles
      CHROME_PROFILES_BASE_DIR: /workspace/chrome_profiles
      CHROME_USER_DATA_DIR: /workspace/chrome_profiles
      CHROME_DOWNLOAD_DIR: /workspace/downloads
      CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
      CHROME_DEBUG_PORT_START: 9222
      RECORDINGS_DIR: /workspace/recordings
      DOWNLOADS_DIR: /workspace/downloads
      WORKSPACE_DIR: /workspace
      PROMPT_BACKUPS_DIR: /app/prompt_backups
      DISPLAY: ":99"
      VNC_PASSWORD: ${VNC_PASSWORD:-secret}
      VNC_PORT: 5900
      NOVNC_PORT: 6080
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
      HYPERBROWSER_API_KEY: ${HYPERBROWSER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PYTHONWARNINGS: ignore::UserWarning
      PYTHONUNBUFFERED: 1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app_network
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined

  # ─────────────────────────────────────────────────────────────────
  # Airflow Init
  # ✅ FIXED: Single-line user creation command to avoid parsing issues
  # ─────────────────────────────────────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    user: "0:0"
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: ${DAG_TIMEZONE:-Africa/Nairobi}
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: ${AIRFLOW_GID:-0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/messages_db?authSource=admin
      CHROME_PROFILE_DIR: /workspace/chrome_profiles
      CHROME_USER_DATA_DIR: /workspace/chrome_profiles
      CHROME_DOWNLOAD_DIR: /workspace/downloads
      CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
      RECORDINGS_DIR: /workspace/recordings
      DOWNLOADS_DIR: /opt/airflow/workspace/downloads
      WORKSPACE_DIR: /workspace
      PROMPT_BACKUPS_DIR: /opt/airflow/prompt_backups
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - chrome_profiles:/workspace/chrome_profiles:rw
      - recordings:/workspace/recordings:rw
      - downloads:/opt/airflow/workspace/downloads:rw
      - downloads:/workspace/downloads:rw
      - ./airflow/scripts:/opt/airflow/scripts
      - backups:/opt/airflow/backups:rw
      - workflows_export:/opt/airflow/workflows_export:rw
      - prompt_backups:/opt/airflow/prompt_backups:rw
      - root_downloads:/root/Downloads:rw
    command: >
      bash -c "
        echo '=== Airflow Init: Running as root to fix permissions ===' &&
        
        echo 'Creating and fixing directory permissions...' &&
        mkdir -p /opt/airflow/logs /workspace/chrome_profiles /workspace/recordings /opt/airflow/workspace/downloads /workspace/downloads /opt/airflow/backups /opt/airflow/workflows_export /opt/airflow/prompt_backups &&
        
        echo 'Ensuring chrome_profiles is owned by airflow (50000:0)...' &&
        chown -R 50000:0 /workspace/chrome_profiles &&
        chmod 755 /workspace/chrome_profiles &&
        
        chown -R 50000:0 /opt/airflow/logs /opt/airflow/backups /opt/airflow/workflows_export /opt/airflow/prompt_backups || true &&
        
        chmod 777 /workspace/recordings /workspace/downloads /opt/airflow/workspace/downloads /opt/airflow/backups /opt/airflow/workflows_export /opt/airflow/prompt_backups /opt/airflow/logs || true &&
        
        echo 'Switching to airflow user for DB init...' &&
        gosu 50000 bash -c '
          echo \"Initializing Airflow database...\" &&
          airflow db init &&
          airflow db migrate &&
          echo \"Creating admin user...\" &&
          airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@localhost --password admin || echo \"User already exists\"
        ' &&
        
        echo '✓ Airflow initialization completed successfully'
      "
    networks:
      - app_network
    restart: "no"

  # ─────────────────────────────────────────────────────────────────
  # Airflow Webserver
  # ─────────────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__DEFAULT_TIMEZONE: ${DAG_TIMEZONE:-Africa/Nairobi}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: ${AIRFLOW_GID:-0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/messages_db?authSource=admin
      CHROME_PROFILE_DIR: /workspace/chrome_profiles
      CHROME_USER_DATA_DIR: /workspace/chrome_profiles
      CHROME_DOWNLOAD_DIR: /workspace/downloads
      CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
      RECORDINGS_DIR: /workspace/recordings
      DOWNLOADS_DIR: /opt/airflow/workspace/downloads
      WORKSPACE_DIR: /workspace
      PROMPT_BACKUPS_DIR: /opt/airflow/prompt_backups
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - chrome_profiles:/workspace/chrome_profiles:rw
      - recordings:/workspace/recordings:rw
      - downloads:/opt/airflow/workspace/downloads:rw
      - downloads:/workspace/downloads:rw
      - backups:/opt/airflow/backups:ro
      - workflows_export:/opt/airflow/workflows_export:ro
      - prompt_backups:/opt/airflow/prompt_backups:ro
      - root_downloads:/root/Downloads:ro
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    expose:
      - "8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ─────────────────────────────────────────────────────────────────
  # Airflow Scheduler
  # ─────────────────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 4
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__DEFAULT_TIMEZONE: ${DAG_TIMEZONE:-Africa/Nairobi}
      AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY: 4
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: 90
      AIRFLOW__CORE__KILLED_TASK_CLEANUP_TIME: 120
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: ${AIRFLOW_GID:-0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-messages}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/messages_db?authSource=admin
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-messages}
      PGPASSWORD: ${POSTGRES_PASSWORD:-airflow}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-pnata0890@gmail.com}
      EMAIL_TO: ${EMAIL_TO:-pnata0890@gmail.com}
      BACKUP_MAX_SIZE_MB: ${BACKUP_MAX_SIZE_MB:-25}
      BACKUP_DIR: /opt/airflow/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      WORKFLOWS_EXPORT_DIR: /opt/airflow/workflows_export
      PROMPT_BACKUPS_DIR: /opt/airflow/prompt_backups
      CHROME_PROFILE_DIR: /workspace/chrome_profiles
      CHROME_USER_DATA_DIR: /workspace/chrome_profiles
      CHROME_DOWNLOAD_DIR: /workspace/downloads
      CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
      RECORDINGS_DIR: /workspace/recordings
      DOWNLOADS_DIR: /opt/airflow/workspace/downloads
      WORKSPACE_DIR: /workspace
      DISPLAY: ":99"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HYPERBROWSER_API_KEY: ${HYPERBROWSER_API_KEY:-}
      DAG_TIMEZONE: ${DAG_TIMEZONE:-Africa/Nairobi}
      DAG_SCHEDULE: ${DAG_SCHEDULE:-0 16 * * 0}
      DAG_START_DATE: ${DAG_START_DATE:-2025-07-01}
      JS_EXECUTOR_PATH: /opt/airflow/src/scripts/local_execute
      TWITTER_CONSUMER_KEY: ${TWITTER_CONSUMER_KEY}
      TWITTER_CONSUMER_SECRET: ${TWITTER_CONSUMER_SECRET}
      TWITTER_ACCESS_TOKEN_KEY: ${TWITTER_ACCESS_TOKEN_KEY}
      TWITTER_ACCESS_TOKEN_SECRET: ${TWITTER_ACCESS_TOKEN_SECRET}
      TZ: ${DAG_TIMEZONE:-Africa/Nairobi}
      PYTHONPATH: /opt/airflow/src
      PYTHONWARNINGS: ignore::UserWarning
      PYTHONUNBUFFERED: 1
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
      - chrome_profiles:/workspace/chrome_profiles:rw
      - recordings:/workspace/recordings:rw
      - downloads:/opt/airflow/workspace/downloads:rw
      - downloads:/workspace/downloads:rw
      - ./airflow/scripts:/opt/airflow/scripts
      - backups:/opt/airflow/backups:rw
      - workflows_export:/opt/airflow/workflows_export:rw
      - prompt_backups:/opt/airflow/prompt_backups:rw
      - root_downloads:/root/Downloads:rw
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app_network
    restart: unless-stopped
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '1'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 4096
