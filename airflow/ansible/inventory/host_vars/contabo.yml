---
# Contabo server specific variables
ansible_host: "YOUR_CONTABO_SERVER_IP"  # Replace with actual IP
ansible_user: "root"
ansible_ssh_private_key_file: "~/.ssh/id_rsa"

# Server specifications
server_memory: "16g"
server_cpus: "6"
server_disk: "400g"

# Network settings
public_ip: "YOUR_CONTABO_SERVER_IP"  # Replace with actual IP
private_network: "10.0.0.0/8"

# Firewall rules
allowed_ports:
  - "22"    # SSH
  - "80"    # HTTP
  - "443"   # HTTPS
  - "8080"  # Airflow
  - "8501"  # Streamlit