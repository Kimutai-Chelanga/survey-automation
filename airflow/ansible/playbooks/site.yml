---
- name: Complete Application Deployment
  hosts: all
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: Update system packages
      package:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat" or ansible_os_family == "Debian"
      
    - name: Install basic utilities
      package:
        name:
          - curl
          - wget
          - git
          - htop
          - vim
          - unzip
        state: present

  roles:
    - docker
    - application
    - monitoring

  post_tasks:
    - name: Verify application is running
      uri:
        url: "http://localhost:8501/_stcore/health"
        method: GET
        status_code: 200
      retries: 10
      delay: 10
      
    - name: Verify Airflow is running
      uri:
        url: "http://localhost:8080/health"
        method: GET
        status_code: 200
      retries: 10
      delay: 10